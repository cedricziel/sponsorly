name: Sponsorly
options:
  bundleIdPrefix: com.cedricziel
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  AmazonAds:
    url: https://github.com/cedricziel/swift-amazon-ads
    branch: main

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Sponsorly:
    type: application
    platform: iOS
    sources:
      - path: Sponsorly
    dependencies:
      - package: AmazonAds
        product: AmazonAdsCore
      - package: AmazonAds
        product: AmazonAdsProfilesAPIv2
      - package: AmazonAds
        product: AmazonAdsSponsoredProductsAPIv3
      - package: AmazonAds
        product: AmazonAdsReportingAPIv3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.sponsorly
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Sponsorly
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: "\"Sponsorly/Preview Content\""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  SponsorlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SponsorlyTests
    dependencies:
      - target: Sponsorly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.sponsorly.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sponsorly.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Sponsorly"

schemes:
  Sponsorly:
    build:
      targets:
        Sponsorly: all
        SponsorlyTests: [test]
    test:
      targets:
        - SponsorlyTests
    run:
      config: Debug
    archive:
      config: Release
