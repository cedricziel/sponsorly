name: Sponsorly
options:
  bundleIdPrefix: com.cedricziel
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  AmazonAds:
    url: https://github.com/cedricziel/swift-amazon-ads
    branch: main

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: WPW3QSLZ2F
    CODE_SIGN_STYLE: Automatic

targets:
  Sponsorly:
    type: application
    platform: iOS
    sources:
      - path: Sponsorly
    dependencies:
      - package: AmazonAds
        product: AmazonAdsCore
      - package: AmazonAds
        product: AmazonAdsProfilesAPIv2
      - package: AmazonAds
        product: AmazonAdsSponsoredProductsAPIv3
      - package: AmazonAds
        product: AmazonAdsReportingAPIv3
    # LWA credentials are injected from a git-ignored xcconfig (see Secrets.example.xcconfig).
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    # Info.plist is managed by XcodeGen so we can declare the OAuth URL scheme and
    # surface the LWA credentials (read at runtime via Bundle.main).
    info:
      path: Sponsorly/Info.plist
      properties:
        CFBundleDisplayName: Sponsorly
        LSRequiresIPhoneOS: true
        # Only exempt encryption is used (HTTPS/TLS, Keychain, SHA-256 for PKCE).
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LWAClientID: $(LWA_CLIENT_ID)
        LWAClientSecret: $(LWA_CLIENT_SECRET)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.cedricziel.sponsorly.oauth
            CFBundleURLSchemes:
              - amzn-com.cedricziel.sponsorly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.sponsorly
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: "\"Sponsorly/Preview Content\""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  SponsorlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SponsorlyTests
    dependencies:
      - target: Sponsorly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.sponsorly.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sponsorly.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Sponsorly"

schemes:
  Sponsorly:
    build:
      targets:
        Sponsorly: all
        SponsorlyTests: [test]
    test:
      targets:
        - SponsorlyTests
    run:
      config: Debug
    archive:
      config: Release
