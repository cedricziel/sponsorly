# SwiftLint configuration.
#
# Formatting style is owned by SwiftFormat (run first in the pre-commit hook).
# Where the two tools would disagree, defer to SwiftFormat and disable the
# conflicting SwiftLint rule so they don't fight:
#   • trailing_comma — SwiftFormat adds trailing commas in multiline collections
#     (cleaner diffs); SwiftLint's default rule forbids them.
#   • opening_brace — SwiftFormat wraps the brace onto its own line for multiline
#     conditions (`if`/`for … where`); SwiftLint wants it on the same line.
disabled_rules:
  - trailing_comma
  - opening_brace

# Never lint build output or resolved Swift Package sources (CI writes both
# under build/; XcodeGen writes the project under the repo root).
excluded:
  - build
  - .build
  - DerivedData
  - Pods
